<!DOCTYPE html>
<html>
<head>
    <title>midi drum cus im bored</title>
    <style>
        body {
            background-color: white;
            color: black;
            font-family: serif;
        }
        table {
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 5px;
            text-align: center;
        }
        .current-step {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>midi maker</h1>
    <p>i just made sum BULLSHITTT</p>

    <button id="playBtn">play</button>
    <button id="stopBtn">stop</button>
    <label>tempo: <input type="number" id="tempo" value="120"></label>

    <div id="container">
    </div>

    <script>
        const numSteps = 16;
        let isPlaying = false;
        let currentStep = 0;
        let intervalId = null;
        let audioCtx;
        let noiseBuffer;

        const rows = [
            { name: "kick" },
            { name: "snare" },
            { name: "hat" },
            { name: "beep" }
        ];

        function buildGrid() {
            let html = '<table id="grid">';
            for (let r = 0; r < rows.length; r++) {
                html += '<tr>';
                html += `<td>${rows[r].name}</td>`;
                for (let c = 0; c < numSteps; c++) {
                    html += `<td id="cell-${r}-${c}"><input type="checkbox" id="chk-${r}-${c}"></td>`;
                }
                html += '</tr>';
            }
            html += '</table>';
            document.getElementById('container').innerHTML = html;
        }

        function createNoiseBuffer() {
            let bufferSize = audioCtx.sampleRate * 2;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            return buffer;
        }

        function playDrum(name) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                noiseBuffer = createNoiseBuffer();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const time = audioCtx.currentTime;

            if (name === 'kick') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);

                gain.gain.setValueAtTime(1, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);

                osc.start(time);
                osc.stop(time + 0.5);
            } 
            else if (name === 'snare') {
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                const noiseGain = audioCtx.createGain();

                noiseGain.gain.setValueAtTime(1, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);

                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start(time);
                noise.stop(time + 0.2);

                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                const oscGain = audioCtx.createGain();
                oscGain.gain.setValueAtTime(0.5, time);
                oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);

                osc.connect(oscGain);
                oscGain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(250, time);
                
                osc.start(time);
                osc.stop(time + 0.1);
            } 
            else if (name === 'hat') {
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.value = 10000;
                const noiseGain = audioCtx.createGain();

                noiseGain.gain.setValueAtTime(0.3, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);

                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start(time);
                noise.stop(time + 0.05);
            } 
            else if (name === 'beep') {
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.frequency.setValueAtTime(440, time);

                gain.gain.setValueAtTime(0.2, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);

                osc.start(time);
                osc.stop(time + 0.2);
            }
        }

        function tick() {
            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < numSteps; c++) {
                    document.getElementById(`cell-${r}-${c}`).classList.remove('current-step');
                }
            }

            for (let r = 0; r < rows.length; r++) {
                document.getElementById(`cell-${r}-${currentStep}`).classList.add('current-step');
            }

            for (let r = 0; r < rows.length; r++) {
                let isChecked = document.getElementById(`chk-${r}-${currentStep}`).checked;
                if (isChecked) {
                    playDrum(rows[r].name);
                }
            }

            currentStep++;
            if (currentStep >= numSteps) {
                currentStep = 0;
            }
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            if (isPlaying) return;
            isPlaying = true;
            
            let bpm = document.getElementById('tempo').value;
            let intervalMs = (60000 / bpm) / 4;
            
            intervalId = setInterval(tick, intervalMs);
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            isPlaying = false;
            clearInterval(intervalId);
            currentStep = 0;
            
            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < numSteps; c++) {
                    let cell = document.getElementById(`cell-${r}-${c}`);
                    if(cell) cell.classList.remove('current-step');
                }
            }
        });

        buildGrid();
    </script>
</body>
</html>
